<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left vertical line of N -->
  <rect x="12" y="8" width="8" height="48" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- Right vertical line of N -->
  <rect x="44" y="8" width="8" height="48" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- Diagonal line (optical illusion middle) -->
  <g opacity="0.9">
    <rect x="18" y="24" width="32" height="8" 
          fill="url(#grad)" 
          transform="rotate(45 34 28)"
          filter="url(#shadow)"/>
  </g>
</svg>